# ═══════════════════════════════════════════════════════════════
#  PhishGuard — Render Blueprint (Infrastructure as Code)
#
#  This file allows you to deploy PhishGuard on Render with a
#  single click or push. Render will read this file and
#  automatically set up the web service and database.
#
#  To deploy:
#    1. Push this repo to GitHub
#    2. Go to https://dashboard.render.com/blueprints
#    3. Connect your repo and click "Create Blueprint"
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: phishguard
    runtime: python
    region: singapore  # Closest to Pakistan
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: FLASK_DEBUG
        value: False
      - key: REQUIRE_API_KEY
        value: true
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      # Optional: Enable PostgreSQL for persistent storage
      # Render Free PostgreSQL expires after 30 days.
      # For longer-term storage, consider Supabase free tier.
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: phishguard-db
      #     property: connectionString

# Uncomment this section if you want Render to provision a PostgreSQL database
# databases:
#   - name: phishguard-db
#     plan: free
#     region: singapore
