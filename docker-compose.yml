services:
  # ════════════════════════════════════════════════════════════
  #  PhishGuard Backend (Flask API)
  # ════════════════════════════════════════════════════════════
  phishguard:
    build: .
    # For direct HTTP access (local/dev), uncomment ports below:
    # ports:
    #   - "8080:8080"
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8080
      - FLASK_DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-secret}
      - DATABASE_PATH=/app/data/phishguard.db
      - REQUIRE_API_KEY=true
    volumes:
      - phishguard_data:/app/data
    restart: unless-stopped
    # Required when nginx is used for SSL termination
    networks:
      - phishguard_net

  # ════════════════════════════════════════════════════════════
  #  Nginx Reverse Proxy (for production HTTPS)
  #  Uncomment this section for production deployments.
  #  Place your SSL certs in ./certs/ or use Let's Encrypt.
  # ════════════════════════════════════════════════════════════
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/ssl:ro
  #   depends_on:
  #     - phishguard
  #   networks:
  #     - phishguard_net
  #   restart: unless-stopped

networks:
  phishguard_net:
    driver: bridge

volumes:
  phishguard_data:
