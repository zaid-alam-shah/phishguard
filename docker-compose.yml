services:
  phishguard:
    build: .
    ports:
      - "8080:8080"
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8080
      - FLASK_DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-secret}
      - DATABASE_PATH=/app/data/phishguard.db
    volumes:
      - phishguard_data:/app/data
    restart: unless-stopped

volumes:
  phishguard_data:
