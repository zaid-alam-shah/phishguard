# ═══════════════════════════════════════════════════════════════
#  PhishGuard — Nginx Reverse Proxy Configuration
#  Provides SSL/TLS termination and security headers.
#  For Docker Compose deployment with Let's Encrypt.
# ═══════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    # ── Upstream ─────────────────────────────────────────────────
    upstream phishguard_backend {
        server phishguard:8080;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge support
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates (mount these from certbot or volume)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "0";
        add_header Referrer-Policy strict-origin-when-cross-origin;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Proxy all requests to the Flask backend
        location / {
            proxy_pass http://phishguard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_redirect off;

            # Increased timeouts for slow WHOIS lookups
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
        }
    }
}
