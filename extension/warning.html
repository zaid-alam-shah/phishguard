<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard - Warning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: #1e1e2e;
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .icon { font-size: 64px; margin-bottom: 12px; line-height: 1; }
    h2 { color: #ef4444; margin: 0 0 6px; font-size: 22px; }
    .sub { color: #fca5a5; margin: 0 0 16px; font-size: 14px; line-height: 1.5; }
    /* ── Verdict Bar ── */
    .verdict-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .verdict-bar.phishing {
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #ef4444;
    }
    .verdict-bar.risky {
      background: #451a03;
      border: 1px solid #f59e0b;
      color: #f59e0b;
    }
    .issues { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
    .url {
      color: #64748b;
      font-size: 11px;
      word-break: break-all;
      margin-bottom: 20px;
      padding: 0 8px;
    }
    .buttons { display: flex; gap: 10px; }
    .btn-block, .btn-back {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-block { background: #ef4444; color: white; }
    .btn-block:hover { background: #dc2626; transform: translateY(-1px); }
    .btn-back {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
    }
    .btn-back:hover { background: #1e293b; color: #e2e8f0; }
    .footer-text { font-size: 10px; color: #475569; margin-top: 14px; }
    .error-page-note {
      font-size: 11px;
      color: #f59e0b;
      background: #451a03;
      border: 1px solid #f59e0b40;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="icon">⚠️</div>
    <h2>Phishing Detected!</h2>
    <p class="sub">
      This link has been blocked by PhishGuard's Real-Time Protection.
    </p>
    <div class="error-page-note">
      🛡️ Navigation blocked by PhishGuard Real-Time Protection.
    </div>
    <div class="verdict-bar" id="verdictBar">⚠️ PHISHING DETECTED</div>
    <p class="issues" id="issuesList"></p>
    <p class="url" id="blockedUrl"></p>
    <div class="buttons">
      <button class="btn-block" id="btnBlock">🛑 Block — Go to Safety</button>
      <button class="btn-back" id="btnContinue">Continue Anyway</button>
    </div>
    <p style="font-size:11px; color:#64748b; margin-top:8px;">
      This site was blocked by PhishGuard Real-Time Protection
    </p>
    <p class="footer-text">
      Scanned by PhishGuard
    </p>
  </div>

  <script src="warning.js"></script>
</body>
</html>
