<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    h1 { font-size: 18px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #94a3b8; margin-top: -2px; }
    .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
    input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: .9; }
    .quick-actions {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .quick-btn {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .quick-btn:hover { background: #334155; color: #e2e8f0; }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
    }
    .status.loading {
      display: block;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
      text-align: center;
    }
    .status.safe {
      display: block;
      background: #064e3b;
      border: 1px solid #10b981;
      color: #6ee7b7;
    }
    .status.phishing {
      display: block;
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
    }
    .status.error {
      display: block;
      background: #451a03;
      border: 1px solid #f97316;
      color: #fdba74;
    }
    .status .risk-score {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .status .verdict { font-size: 15px; font-weight: 600; margin-top: 4px; }
    .status .issues { font-size: 11px; margin-top: 6px; color: inherit; opacity: .8; }
    .details { display: none; background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .details.show { display: block; }
    .detail-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
    .detail-row .label { color: #94a3b8; }
    .detail-row .value { font-weight: 500; }
    .shortener-info {
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .shortener-info strong { color: #93c5fd; }
    .footer { text-align: center; font-size: 10px; color: #475569; margin-top: 12px; }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0 8px;
      font-size: 12px;
      color: #94a3b8;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: #1e293b;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 11px;
    }
    .history-item .hurl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .badge.safe { background: #064e3b; color: #6ee7b7; }
    .badge.phishing { background: #450a0a; color: #fca5a5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">PG</div>
    <div>
      <h1>PhishGuard</h1>
      <div class="subtitle">URL Security Scanner</div>
    </div>
  </div>

  <div class="input-group">
    <input type="text" id="urlInput" placeholder="Paste a URL to scan..." autofocus>
    <button id="scanBtn">Scan</button>
  </div>

  <div class="quick-actions">
    <div class="quick-btn" id="tabUrlBtn">Current Tab</div>
    <div class="quick-btn" id="clipboardBtn">Clipboard</div>
    <div class="quick-btn" id="clearBtn">Clear</div>
  </div>

  <div class="status" id="status">
    <div id="statusContent"></div>
  </div>

  <div class="details" id="details">
    <div class="shortener-info" id="shortenerInfo" style="display:none"></div>
    <div class="detail-row"><span class="label">URL</span><span class="value" id="detailUrl"></span></div>
    <div class="detail-row"><span class="label">ML Score</span><span class="value" id="detailMl"></span></div>
    <div class="detail-row"><span class="label">Domain Age</span><span class="value" id="detailAge"></span></div>
    <div class="detail-row"><span class="label">SSL Days</span><span class="value" id="detailSsl"></span></div>
  </div>

  <div class="history-header">
    <span>Recent Scans</span>
    <span id="historyCount">0</span>
  </div>
  <div id="historyList"></div>

  <div class="footer">PhishGuard v1.0 &mdash; API: 127.0.0.1:8080</div>

  <script src="popup.js"></script>
</body>
</html>
